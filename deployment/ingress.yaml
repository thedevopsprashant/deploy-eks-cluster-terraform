apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: flipkart-ns
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/load-balancer-name: my-app-alb
    # Target type and Listener Port
    alb.ingress.kubernetes.io/target-type: ip

    # Use below annotations incase you want to use HTTPS with ACM certificate
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]' 
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:970378220457:certificate/93296424-711a-4bb9-8bc3-f7a76c0f2d87 # Replace with your ACM certificate ARN
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
    # 👇 Default catch-all (matches any host not listed above) #host: ""
    - http: 
        paths:
         - path: /
           pathType: Prefix
           backend:
              service:
                name: amazon-svc
                # or your default frontend
                port:
                  number: 80
